<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jom Membaca Keluarga Hana</title>
    <style>
        :root {
            --mario-red: #E52521;
            --mario-blue: #049CD8;
            --mario-yellow: #FBD000;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #5C94FC; /* Warna langit Mario */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        #game-container {
            background: white;
            width: 90%;
            max-width: 600px;
            padding: 20px;
            border-radius: 20px;
            border: 5px solid var(--mario-red);
            text-align: center;
            box-shadow: 0 10px 0 #000;
        }

        .avatar {
            width: 100px;
            height: 100px;
            margin-bottom: 10px;
        }

        #text-display {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            min-height: 60px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        .btn-listen { background: var(--mario-blue); color: white; }
        .btn-record { background: var(--mario-red); color: white; }
        .btn-nav { background: var(--mario-yellow); color: black; }

        #status {
            margin-top: 15px;
            font-weight: bold;
            height: 20px;
        }

        .star {
            font-size: 50px;
            display: none;
            color: var(--mario-yellow);
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <img src="https://img.icons8.com/color/144/super-mario.png" alt="Mario" class="avatar">
    <h2 style="color: var(--mario-red);">Jom Membaca Keluarga Hana</h2>
    
    <div id="star-display" class="star">⭐</div>
    
    <div id="text-display">Memuatkan ayat...</div>
    
    <div id="status">Sila tekan butang 'Dengar Suara'</div>

    <div class="button-group">
        <button class="btn-listen" onclick="playText()">🔊 Dengar Suara</button>
        <button class="btn-record" id="recordBtn" onclick="startRecording()">🎤 Rekod Suara</button>
    </div>

    <div class="button-group" style="margin-top: 20px;">
        <button class="btn-nav" onclick="prevStep()">⬅️ Kembali</button>
        <button class="btn-nav" onclick="nextStep()">Seterusnya ➡️</button>
    </div>
    
    <p style="margin-top: 15px; font-size: 14px;">Markah: <span id="score">0</span></p>
</div>

<script>
    const ayatList = [
        "Ini Hana.",
        "Adik Hana masih kecil.",
        "Umurnya empat tahun.",
        "Ibu dan ayah selalu menjaga adik.",
        "Ayah selalu membaca buku cerita bersama adik.",
        "Abang juga suka menyanyi dengan adik.",
        "Hana melihat mereka dari jauh.",
        "Hana duduk diam di sudut bilik.",
        "Hana berasa sedih.",
        "Kini Hana tahu keluarganya menyayanginya. Hana berasa gembira."
    ];

    let currentStep = 0;
    let score = 0;

    const textDisplay = document.getElementById('text-display');
    const statusDisplay = document.getElementById('status');
    const scoreDisplay = document.getElementById('score');
    const starDisplay = document.getElementById('star-display');

    // Inisialisasi ayat pertama
    updateUI();

    function updateUI() {
        textDisplay.innerText = ayatList[currentStep];
        statusDisplay.innerText = "Sedia untuk membaca?";
        statusDisplay.style.color = "black";
        starDisplay.style.display = "none";
    }

    // 1. Fungsi Dengar Suara (Text-to-Speech)
    function playText() {
        const msg = new SpeechSynthesisUtterance();
        msg.text = ayatList[currentStep];
        msg.lang = 'ms-MY';
        window.speechSynthesis.speak(msg);
    }

    // 2. Fungsi Rakaman & Semakan (Speech Recognition)
    function startRecording() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ms-MY';
        
        statusDisplay.innerText = "Sila baca sekarang...";
        document.getElementById('recordBtn').style.opacity = "0.5";

        recognition.onresult = function(event) {
            const result = event.results[0][0].transcript.toLowerCase().replace(/[.,]/g, "");
            const target = ayatList[currentStep].toLowerCase().replace(/[.,]/g, "");

            if (result.includes(target) || target.includes(result)) {
                handleSuccess();
            } else {
                handleFailure();
            }
        };

        recognition.onspeechend = () => {
            recognition.stop();
            document.getElementById('recordBtn').style.opacity = "1";
        };

        recognition.onerror = () => {
            statusDisplay.innerText = "Ralat dikesan. Cuba lagi.";
            document.getElementById('recordBtn').style.opacity = "1";
        };

        recognition.start();
    }

    function handleSuccess() {
        statusDisplay.innerText = "TAHNIAH! BETUL!";
        statusDisplay.style.color = "green";
        starDisplay.style.display = "block";
        score += 10;
        scoreDisplay.innerText = score;

        // Suara Tahniah
        const congrats = new SpeechSynthesisUtterance("Tahniah! Anda hebat.");
        congrats.lang = 'ms-MY';
        window.speechSynthesis.speak(congrats);
    }

    function handleFailure() {
        statusDisplay.innerText = "Salah tu, sila cuba lagi.";
        statusDisplay.style.color = "red";
        
        const tryAgain = new SpeechSynthesisUtterance("Sila ulang semula.");
        tryAgain.lang = 'ms-MY';
        window.speechSynthesis.speak(tryAgain);
    }

    function nextStep() {
        if (currentStep < ayatList.length - 1) {
            currentStep++;
            updateUI();
        } else {
            alert("Syabas! Anda telah tamat membaca semua ayat!");
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            currentStep--;
            updateUI();
        }
    }
</script>

</body>
</html>
